# BaltiTour Render Blueprint — https://render.com/docs/blueprint-spec

services:
  - type: web
    name: baltitour-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./baltitour.db
      - key: CORS_ORIGINS
        sync: false
      - key: PUBLIC_API_URL
        sync: false
      - key: PUBLIC_WEB_URL
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: JAZZCASH_MERCHANT_ID
        sync: false
      - key: JAZZCASH_PASSWORD
        sync: false
      - key: EASYPAISA_STORE_ID
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: web
    name: baltitour-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
